name: Build MangaCast APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        run: git clone --depth 1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .

      - name: Set up JDK 17
        run: |
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
          echo "$JAVA_HOME_17_X64/bin" >> $GITHUB_PATH

      - name: Generate launcher icons
        run: |
          pip install Pillow --quiet
          python3 - <<'EOF'
          from PIL import Image, ImageDraw
          import os

          sizes = {
            'mipmap-mdpi': 48,
            'mipmap-hdpi': 72,
            'mipmap-xhdpi': 96,
            'mipmap-xxhdpi': 144,
            'mipmap-xxxhdpi': 192,
          }
          for folder, size in sizes.items():
              path = f'app/src/main/res/{folder}'
              os.makedirs(path, exist_ok=True)
              for name in ['ic_launcher.png', 'ic_launcher_round.png']:
                  img = Image.new('RGB', (size, size), '#0B0B0F')
                  draw = ImageDraw.Draw(img)
                  draw.rectangle([0, 0, size // 8, size], fill='#E8473F')
                  img.save(f'{path}/{name}')
          EOF

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Publish APK to Releases
        run: |
          gh release delete latest-apk --yes 2>/dev/null || true
          git -c user.email="actions@github.com" -c user.name="GitHub Actions" \
            push origin :refs/tags/latest-apk 2>/dev/null || true
          gh release create latest-apk \
            app/build/outputs/apk/debug/app-debug.apk#MangaCast.apk \
            --title "MangaCast APK" \
            --notes "Built from commit ${{ github.sha }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
